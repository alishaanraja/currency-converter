<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Currency Converter</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f7fc;
            color: #3d444f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .converter-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 350px;
            width: 100%;
            border: 1px solid #e2edf7;
        }
        input, select {
            width: 90%;
            padding: 10px;
            border: 1px solid #d4e5f7;
            border-radius: 8px;
            margin-bottom: 15px;
            outline: none;
            font-size: 1rem;
            box-sizing: border-box;
        }
        button {
            background-color: #4b6584;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 90%;
            font-size: 1rem;
        }
        button:hover {
            background-color: #3b526d;
        }
        .result {
            margin-top: 25px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #4b6584;
        }
    </style>
</head>
<body>

    <div class="converter-card">
        <h2>🪙 Currency Converter</h2>
        
        <input type="number" id="amountInput" placeholder="Enter amount..." value="1">
        
        <select id="fromCurrency">
            <option value="USD">USD - US Dollar</option>
            <option value="EUR">EUR - Euro</option>
            <option value="GBP">GBP - British Pound</option>
            <option value="PKR">PKR - Pakistani Rupee</option>
            <option value="AED">AED - UAE Dirham</option>
            <option value="SAR">SAR - Saudi Riyal</option>
        </select>

        <select id="toCurrency">
            <option value="PKR" selected>PKR - Pakistani Rupee</option>
            <option value="USD">USD - US Dollar</option>
            <option value="EUR">EUR - Euro</option>
            <option value="GBP">GBP - British Pound</option>
            <option value="AED">AED - UAE Dirham</option>
            <option value="SAR">SAR - Saudi Riyal</option>
        </select>

        <button id="convertBtn">Convert Currency</button>

        <div class="result" id="conversionResult">--</div>
    </div>

    <script>
        document.getElementById('convertBtn').addEventListener('click', function() {
            const amount = parseFloat(document.getElementById('amountInput').value);
            const from = document.getElementById('fromCurrency').value;
            const to = document.getElementById('toCurrency').value;

            if (isNaN(amount) || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }

            // Precisely mapped current rates relative to 1 USD base
            const baseRatesInUSD = {
                "USD": 1,
                "EUR": 0.88,
                "GBP": 0.75,
                "PKR": 279.16,
                "AED": 3.67,
                "SAR": 3.75
            };

            const amountInUSD = amount / baseRatesInUSD[from];
            const convertedAmount = amountInUSD * baseRatesInUSD[to];

            const formattedResult = convertedAmount.toLocaleString(undefined, {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });

            document.getElementById('conversionResult').innerText = `${amount} ${from} = ${formattedResult} ${to}`;
        });
    </script>
</body>
</html>
